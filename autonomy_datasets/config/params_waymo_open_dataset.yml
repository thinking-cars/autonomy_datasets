/**/*:
  ros__parameters:

    ## Common Parameters ##
    use_camera: true
    use_lidar: true
    use_radar: true

    ## Waymo Open Dataset ##
    dataset: waymo_open_dataset
    dataset_split: validation  # all, training, validation
    waymo_min_lidar_points_in_bbox: 1
    waymo_lidar_object_list_filter_cam_front: false
